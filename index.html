<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Evaluación - FEIRNNR II PA 2026</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <header class="app-header">
        <h1>Simulador de Evaluación Académica</h1>
        <p>FEIRNNR II PA 2026 – Razonamiento Verbal, Numérico y Matemática</p>
    </header>

    <main class="main-container">
        <!-- Panel Lateral / Categorías -->
        <aside class="sidebar">
            <h3>Categorías</h3>
            <ul id="category-list">
                <li class="active" data-cat="all">Todas las preguntas</li>
                <li data-cat="analogias">Analogías</li>
                <li data-cat="inferencias">Inferencias</li>
                <li data-cat="comprobacion">Comprobación / Números</li>
                <li data-cat="matematica">Matemática / Matrices</li>
            </ul>
            <div class="score-card">
                <h4>Puntaje Actual</h4>
                <p id="score-display">0 / 0</p>
                <button id="reset-btn">Reiniciar Simulador</button>
            </div>
        </aside>

        <!-- Contenedor de Preguntas -->
        <section class="quiz-container" id="quiz-container">
            <!-- Las preguntas se generan dinámicamente con JS -->
        </section>
    </main>

    <script src="index.js"></script>
</body>
</html>
