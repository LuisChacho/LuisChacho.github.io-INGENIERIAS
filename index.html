<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador FEIRNNR PA - 150 Preguntas</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Simulador FEIRNNR PA</h2>
        <div>
            <strong id="q-counter">Pregunta 1 / 150</strong>
            <button class="btn-reset" onclick="confirmReset()">Reiniciar Examen</button>
        </div>
    </div>

    <!-- Barra de progreso global -->
    <div class="progress-bar-container">
        <div id="progress-bar" class="progress-bar"></div>
    </div>
    <p id="progress-text" class="progress-text">Respondidas: 0 / 150</p>

    <div class="controls">
        <label for="topic-select"><strong>Filtrar Tema:</strong></label>
        <select id="topic-select" onchange="filterTopic()">
            <option value="all">Todos los temas (150 Preguntas)</option>
            <option value="rv_analogias">1. CAP-R.V.-ANALOGÍAS (10)</option>
            <option value="rv_inferencias">2. CAP-R.V.-INFERENCIAS (10)</option>
            <option value="rn_comprobacion">3. CAP-R.N.-COMPROBACIÓN (10)</option>
            <option value="rn_relaciones">4. CAP-R.N.-RELACIONES NUMÉRICAS (10)</option>
            <option value="rn_problemas">5. CAP-R.N.-ANÁLISIS DE PROBLEMAS (10)</option>
            <option value="mat_reales">6. CMP-MAT-NÚMEROS REALES (10)</option>
            <option value="mat_algebra">7. CMP-MAT-EXPRESIONES ALGEBRAICAS (10)</option>
            <option value="mat_funciones">8. CMP-MAT-FUNCIONES Y SUS GRÁFICAS (10)</option>
            <option value="mat_geometria">9. CMP-MAT-GEOMETRÍA Y ECUACIÓN DE LA RECTA (10)</option>
            <option value="mat_trigonometria">10. CMP-MAT-TRIGONOMETRÍA (10)</option>
            <option value="mat_sucesiones">11. CMP-MAT-SUCESIONES, SERIES Y PROBABILIDADES (10)</option>
            <option value="mat_logica">12. CMP-MAT-LÓGICA Y CONJUNTOS (10)</option>
            <option value="fis_vectorial">13. CMP-FIS-FÍSICA VECTORIAL Y SUS APLICACIONES (10)</option>
            <option value="fis_cinematica">14. CMP-FIS-CINEMÁTICA (10)</option>
            <option value="fis_dinamica">15. CMP-FIS-DINÁMICA, ENERGÍA Y TRABAJO (10)</option>
        </select>
    </div>

    <div id="quiz-body" class="question-card">
        <span id="topic-tag" class="topic-tag"></span>
        <h3 id="prompt-text"></h3>
        <div id="options-box" class="options-container"></div>
        <div id="explanation-box" class="explanation" style="display:none;"></div>
    </div>

    <div id="completion-summary" class="summary-box" style="display:none;">
        🎉 <strong>¡Felicidades! Has completado las 150 preguntas.</strong>
        <p id="final-score"></p>
        <button class="btn-reset" onclick="forceReset()">Reiniciar Simulador</button>
    </div>

    <div class="controls nav-footer">
        <button class="btn-nav" onclick="prevQuestion()">&laquo; Anterior</button>
        <button class="btn-nav" onclick="nextQuestion()">Siguiente &raquo;</button>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
