<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador FEIRNNR PA</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="container">
        <!-- Cabecera de la Aplicación -->
        <div class="header">
            <h2>Simulador FEIRNNR PA</h2>
            <div>
                <strong id="q-counter">Pregunta 1 / 150</strong>
                <span id="timer-display" class="timer-tag">⏱️ 150:00</span>
                <button class="btn-reset" onclick="confirmReset()">Reiniciar Examen</button>
            </div>
        </div>

        <!-- Barra de Progreso General -->
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <p id="progress-text" class="progress-text">Respondidas: 0 / 150 (0%)</p>

        <!-- Filtro por Asignatura / Tema -->
        <div class="filter-box">
            <label for="topic-select"><strong>Filtrar por Tema:</strong></label>
            <select id="topic-select" onchange="filterTopic()">
                <option value="all">Todas las preguntas (150)</option>
                <option value="matematicas">Matemáticas</option>
                <option value="fisica">Física</option>
                <option value="quimica">Química</option>
                <option value="biologia">Biología</option>
                <option value="razonamiento">Razonamiento</option>
            </select>
        </div>

        <!-- Cuerpo del Examen -->
        <div id="quiz-body">
            <div class="question-card">
                <span id="topic-tag" class="topic-tag">Tema</span>
                <p id="prompt-text" class="prompt">Cargando pregunta...</p>
                <div id="options-box" class="options-grid"></div>
                <div id="explanation-box" class="explanation"></div>
            </div>

            <!-- Botones de Navegación -->
            <div class="nav-buttons">
                <button class="btn-nav" onclick="prevQuestion()">Anterior</button>
                <button class="btn-nav" onclick="nextQuestion()">Siguiente</button>
            </div>
        </div>

        <!-- Pantalla de Resumen Final (Oculta al inicio) -->
        <div id="completion-summary" class="summary-card" style="display: none;">
            <h3>🎉 ¡Examen Finalizado!</h3>
            <p id="final-score">Cargando resultados...</p>
            <button class="btn-reset-large" onclick="forceReset()">Reiniciar Intento</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
